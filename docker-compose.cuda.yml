services:
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llamacpp
    shm_size: 16G
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    ipc: host
    volumes:
      - ./models:/models
    ports:
      - 8000:8080
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
    command:
      - -m
      - /models/Qwen3.5-27B-Q4_K_M.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -ngl
      - "99"
      - -c
      - "102400"
      - -fa
      - "1"
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - --no-mmap
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - ouroboros_net

  gate:
    depends_on:
      llamacpp:
        condition: service_healthy
