services:
  ouroboros:
    build:
      context: ..
      dockerfile: ouroboros_runtime/Dockerfile
    container_name: ouroboros_agent
    restart: unless-stopped
    security_opt:
      - seccomp=unconfined
    env_file: .env
    environment:
      - OUROBOROS_REPO_DIR=/app
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - VLLM_BASE_URL=http://llamacpp:8080/v1
    volumes:
      - ../ouroboros_memory:/memory
      - ../ouroboros:/app
    networks:
      - ouroboros_net
    depends_on:
      - llamacpp
      - searxng

  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    networks:
      - ouroboros_net
    ports:
      - "8081:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    depends_on:
      - redis

  redis:
    container_name: redis
    image: docker.io/library/redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
    networks:
      - ouroboros_net
    volumes:
      - redis_data:/data

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: ouroboros_dashboard
    restart: unless-stopped
    ports:
      - "8082:8000"
    volumes:
      - ./dashboard:/app
      - ../ouroboros_memory:/memory:ro
      - ../ouroboros:/agent_soul:ro
    networks:
      - ouroboros_net
    depends_on:
      - ouroboros

networks:
  ouroboros_net:
    driver: bridge

volumes:
  redis_data:
