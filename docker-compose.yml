services:
  ouroboros:
    build:
      context: ..
      dockerfile: ouroboros_runtime/Dockerfile
    container_name: ouroboros_agent
    security_opt:
      - seccomp=unconfined
    env_file: .env
    environment:
      - OUROBOROS_REPO_DIR=/app
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - UV_PROJECT_ENVIRONMENT=/venv
    volumes:
      - ../ouroboros_memory:/memory
      - ../ouroboros:/app
      - ../.venv:/venv
    networks:
      - ouroboros_net
    depends_on:
      - llamacpp
      - searxng
      - gate

  gate:
    build:
      context: ./gate
      dockerfile: Dockerfile
    container_name: ouroboros_gate
    ports:
      - "4000:4000"
    volumes:
      - ../ouroboros_memory:/memory:rw
    environment:
      - TOGETHERAI_API_KEY=${TOGETHERAI_API_KEY:-}
      - MEMORY_DIR=/memory
      - DAILY_BUDGET_LIMIT=${DAILY_BUDGET_LIMIT:-5.00}
      - OUROBOROS_CONTEXT_WINDOW=${OUROBOROS_CONTEXT_WINDOW:-65536}
    networks:
      - ouroboros_net
    depends_on:
      - llamacpp

  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    networks:
      - ouroboros_net
    ports:
      - "8081:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    depends_on:
      - redis

  redis:
    container_name: redis
    image: docker.io/library/redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - ouroboros_net
    volumes:
      - redis_data:/data

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: ouroboros_dashboard
    ports:
      - "8082:8000"
    volumes:
      - ./dashboard:/app
      - ../ouroboros_memory:/memory:ro
      - ../ouroboros:/agent_soul:ro
    networks:
      - ouroboros_net
    depends_on:
      - ouroboros

networks:
  ouroboros_net:
    driver: bridge

volumes:
  redis_data:
