services:
  ouroboros:
    build:
      context: ..
      dockerfile: ouroboros_runtime/Dockerfile
    container_name: ouroboros_agent
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    env_file: .env
    environment:
      - OUROBOROS_REPO_DIR=/app
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - VLLM_BASE_URL=http://llamacpp:8080/v1
    volumes:
      - ../ouroboros_memory:/memory
      - ../ouroboros_agent:/app
    networks:
      - ouroboros_net
    depends_on:
      - llamacpp
      - searxng

  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-rocm
    container_name: llamacpp
    restart: unless-stopped
    privileged: true
    shm_size: 16G
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    ipc: host
    volumes:
      - ./models:/models
    ports:
      - 8000:8080
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.2
      - HIP_FORCE_DEV_KERNARG=1
      - HSA_ENABLE_SDMA=0
      - HIP_VISIBLE_DEVICES=0
    command:
      - -m
      - /models/Qwen3.5-27B-Q4_K_M.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -ngl
      - "99"
      - -c
      - "65536"           # 64k Context Window
      - -fa
      - "1"               # Flash Attention
      - --cache-type-k 
      - q8_0              # 8-bit KV Cache compression
      - --cache-type-v
      - q8_0              # 8-bit KV Cache compression
      - --no-mmap
    networks:
      - ouroboros_net

  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    networks:
      - ouroboros_net
    ports:
      - "8081:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    depends_on:
      - redis

  redis:
    container_name: redis
    image: docker.io/library/redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
    networks:
      - ouroboros_net
    volumes:
      - redis_data:/data

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: ouroboros_dashboard
    restart: unless-stopped
    ports:
      - "8082:8000"
    volumes:
      - ../ouroboros_memory:/memory:ro
    networks:
      - ouroboros_net
    depends_on:
      - ouroboros

networks:
  ouroboros_net:
    driver: bridge

volumes:
  redis_data:
