services:
  ouroboros:
    build:
      context: ..
      dockerfile: ouroboros_runtime/Dockerfile
    container_name: ouroboros_agent
    security_opt:
      - seccomp=unconfined
    env_file: .env
    environment:
      - OUROBOROS_REPO_DIR=/app
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - UV_PROJECT_ENVIRONMENT=/venv
      - UV_CACHE_DIR=/tmp/.uv-cache
      - DEFAULT_MODEL=${DEFAULT_MODEL}
    volumes:
      - ../ouroboros_memory:/memory
      - ../ouroboros:/app
    networks:
      - ouroboros_net
    depends_on:
      searxng:
        condition: service_started
      gate:
        condition: service_healthy

  gate:
    build:
      context: ./gate
      dockerfile: Dockerfile
    container_name: ouroboros_gate
    ports:
      - "4000:4000"
    volumes:
      - ../ouroboros_memory:/memory:rw
      - ./llm_logs:/runtime_logs:rw
    environment:
      - TOGETHERAI_API_KEY=${TOGETHERAI_API_KEY:-}
      - MEMORY_DIR=/memory
      - RUNTIME_LOG_DIR=/runtime_logs
      - DAILY_BUDGET_LIMIT=${DAILY_BUDGET_LIMIT:-5.00}
      - OUROBOROS_CONTEXT_WINDOW=${OUROBOROS_CONTEXT_WINDOW:-92000}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request, json; resp = urllib.request.urlopen('http://localhost:4000/health').read(); data = json.loads(resp); exit(0 if data.get('status') == 'healthy' else 1)"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    networks:
      - ouroboros_net

  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    networks:
      - ouroboros_net
    ports:
      - "8081:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    container_name: redis
    image: docker.io/library/redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - ouroboros_net
    volumes:
      - redis_data:/data
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: ouroboros_dashboard
    ports:
      - "8082:8000"
    volumes:
      - ./dashboard:/app
      - ../ouroboros_memory:/memory:ro
      - agent_workspace:/agent_soul:ro
      - ./llm_logs:/runtime_logs:ro
    environment:
      - RUNTIME_LOG_DIR=/runtime_logs
    networks:
      - ouroboros_net
    depends_on:
      - ouroboros
    restart: unless-stopped

networks:
  ouroboros_net:
    driver: bridge

volumes:
  redis_data:
  agent_workspace:
