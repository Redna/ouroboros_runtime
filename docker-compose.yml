services:
  ouroboros:
    build:
      context: ..
      dockerfile: ouroboros_runtime/Dockerfile
    container_name: ouroboros_agent
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    env_file: .env
    environment:
      - OUROBOROS_DRIVE_ROOT=/drive
      - OUROBOROS_REPO_DIR=/app
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - VLLM_BASE_URL=http://llamacpp:8080/v1
    volumes:
      - ouroboros_data:/drive
      - ../ouroboros_agent:/app
    networks:
      - ouroboros_net

networks:
  ouroboros_net:
    external: true

volumes:
  ouroboros_data:
