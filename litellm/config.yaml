model_list:
  # Local primary model (Qwen override)
  - model_name: Qwen3.5-27B-Q4_K_M.gguf
    litellm_params:
      model: openai/Qwen3.5-27B-Q4_K_M.gguf
      api_base: http://llamacpp:8080/v1
      api_key: local-vllm-key # Dummy key for local backend

  # Fallback/Default name from seed_agent.py
  - model_name: mistralai_Mistral-Small-3.2-24B-Instruct-2506-Q4_K_M.gguf
    litellm_params:
      model: openai/mistralai_Mistral-Small-3.2-24B-Instruct-2506-Q4_K_M.gguf
      api_base: http://llamacpp:8080/v1
      api_key: local-vllm-key

  # Future TogetherAI integration
  - model_name: together_ai/mistral
    litellm_params:
      model: together_ai/mistralai/Mistral-7B-Instruct-v0.1
      api_key: os.environ/TOGETHERAI_API_KEY

litellm_settings:
  # Hook into our custom python logger script
  callbacks: custom_logger.proxy_handler_instance
