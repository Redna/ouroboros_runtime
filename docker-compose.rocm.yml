services:
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-rocm
    container_name: llamacpp
    privileged: true
    shm_size: 16G
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    ipc: host
    volumes:
      - ./models:/models
    ports:
      - 8000:8080
    environment:
      - HSA_ENABLE_SDMA=0
    command:
      - -m
      - /models/Qwen3.5-27B-Q4_K_M.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -ngl
      - "999"               
      - -c
      - "102400"          
      - --no-warmup
      - --flash-attn      
      - "on"              
      - --cache-type-k
      - "q8_0"            
      - --cache-type-v
      - "q8_0"            
      - -b
      - "1024"            
      - -ub
      - "1024"            
      - -np
      - "1"  
    networks:
      - ouroboros_net
