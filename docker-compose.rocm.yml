services:
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-rocm
    container_name: llamacpp
    restart: unless-stopped
    privileged: true
    shm_size: 16G
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    ipc: host
    volumes:
      - ./models:/models
    ports:
      - 8000:8080
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.2
      - HIP_FORCE_DEV_KERNARG=1
      - HSA_ENABLE_SDMA=0
      - HIP_VISIBLE_DEVICES=0
    command:
      - -m
      - /models/Qwen3.5-27B-Q4_K_M.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -ngl
      - "99"
      - -c
      - "${OUROBOROS_CONTEXT_WINDOW:-16384}"
      - -fa
      - "1"               # Flash Attention
      - --cache-type-k
      - q4_0              # 4-bit KV Cache compression
      - --cache-type-v
      - q4_0              # 4-bit KV Cache compression
      - --no-warmup
    networks:
      - ouroboros_net
