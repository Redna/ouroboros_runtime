# SearXNG settings

use_default_settings: true

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "super-secret-key-change-me-later"
  limiter: false  # Internal network, no need for limiter
  image_proxy: true

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

engines:
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
  - name: google
    engine: google
    shortcut: g
  - name: bing
    engine: bing
    shortcut: b
  - name: brave
    engine: brave
    shortcut: br

enabled_plugins:
  - 'Hash plugin'
  - 'Self-Inform plugin'
  - 'Tracker-aware plugin'
  - 'Acknowledge plugin'
